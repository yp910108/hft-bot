# Polymarket HFT Bot 主配置文件
#
# 本文件集中存放运行期可调参数，修改后无需改动代码。
# 字段名与各 crate 的配置结构体一一对应，由 app 启动时加载并反序列化。

# 手续费模型（对应 domain::fee::FeeModel）
#
# Polymarket 官方文档未公开费率，实测 Taker 约 3% 多，统一按 4% 计提作为
# 略偏保守的口径。若后续费率变化，只需修改此处即可一键调整全局。
[fee]
# Maker（被动挂单）费率，0.0 表示零费。
maker_fee_rate = "0.0"
# Taker（主动吃单）费率，0.04 表示 4%。
taker_fee_rate = "0.04"
